<ion-app>
  <ion-split-pane contentId="main-content" when="md">
    <ion-menu contentId="main-content" type="overlay">
      <ion-header>
        <ion-toolbar>
          <ion-title color="primary" class="font-bold">FindDash</ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-content class="ion-padding-vertical">
        <ion-list lines="none">
          <ion-menu-toggle auto-hide="false">
            <ion-item routerLink="/dashboard" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon slot="start" name="home-outline"></ion-icon>
              <ion-label>Home</ion-label>
            </ion-item>

            <ion-item routerLink="/transactions" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon slot="start" name="swap-horizontal-outline"></ion-icon>
              <ion-label>Transações</ion-label>
            </ion-item>

            <ion-item routerLink="/accounts" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon slot="start" name="wallet-outline"></ion-icon>
              <ion-label>Contas</ion-label>
            </ion-item>

            <ion-item routerLink="/budgets" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon slot="start" name="pie-chart-outline"></ion-icon>
              <ion-label>Orçamentos</ion-label>
            </ion-item>

            <ion-item routerLink="/goals" routerDirection="root" lines="none" detail="false" routerLinkActive="selected">
              <ion-icon slot="start" name="trophy-outline"></ion-icon>
              <ion-label>Metas</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
      
      <ion-footer>
        <ion-item button lines="none" detail="false">
           <ion-icon slot="start" name="log-out-outline"></ion-icon>
           <ion-label>Sair</ion-label>
        </ion-item>
      </ion-footer>
    </ion-menu>

    <div class="ion-page" id="main-content">
      <ion-router-outlet></ion-router-outlet>
    </div>
  </ion-split-pane>
</ion-app>
